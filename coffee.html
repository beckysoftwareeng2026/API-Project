<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Tasty Dishes</title>
        <link rel="stylesheet" href="style.css" />
        <script src="https://kit.fontawesome.com/ba6fb18e67.js"
            crossorigin="anonymous"></script>
    </head>

    <body id="coffee__body">
        <section>
            <nav>
                <div class="nav__container">
                    <img class="logo" src="tastydishes.jpg"
                        alt="Tasty Dishes Logo" />
                    <ul class="nav__links">
                        <li><a href="/index.html"
                                class="nav__link">Home</a></li>
                        <li><a href="#" class="nav__link">Contact</a></li>
                        <li><a href="#"
                                class="nav__link nav__link--primary">Dishes</a></li>
                    </ul>
                    <button class="btn__menu" onclick="openMenu()">
                        <i class="fas fa-bars"></i>
                    </button>
                    <div class="menu__backdrop" style="visibility: hidden;">
                        <button class="btn__menu btn__menu--close"
                            onclick="closeMenu()">
                            <i class="fas fa-times"></i>
                        </button>
                        <ul class="menu__links">
                            <li class="menu__list">
                                <a href="#" class="menu__link"
                                    onclick="closeMenu()">Home</a>
                            </li>
                            <li class="menu__list">
                                <a href="#features" class="menu__link"
                                    onclick="closeMenu()">Dishes</a>
                            </li>
                            <li class="menu__list">
                                <a class="menu__link no-cursor"
                                    onclick="closeMenu()">Contacts</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </section>

        <main id="coffee__main">
            <section>
                <div class="container">
                    <div class="row">
                        <div class="books__header">
                            <h2 class="section__title books__header--title">
                                All <span class="teal">Dishes</span>
                            </h2>
                            <div class="input__search">
                                <input type="text" id="search"
                                    placeholder="Search for dishes"
                                    oninput="searchCoffee(event)" />
                                <a href="#features">
                                    <button class="btn">Start Shopping</button>
                                </a>
                            </div>

                            <select id="filter" onchange="filterCoffee(event)">
                                <option value disabled selected>Sort</option>
                                <option value="LOW_TO_HIGH">Price, Low to
                                    High</option>
                                <option value="HIGH_TO_LOW">Price, High to
                                    Low</option>
                                <option value="RATING">Rating</option>
                            </select>
                        </div>
                        <div class="coffee__loading">
                            <i
                                class="fas fa-spinner coffee__loading--spinner"></i>
                        </div>
                        <div class="coffees"></div>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <div class="container">
                <div class="row row__column">
                    <a href="#">
                        <figure class="footer__logo">
                            <img src="tastydishes.jpg"
                                class="footer__logo--img"
                                alt="Tasty Dishes Logo">
                        </figure>
                    </a>
                    <div class="footer__list">
                        <a href="#" class="footer__link">Home</a>
                        <a class="footer__link no-cursor">About</a>
                        <a href="#features" class="footer__link">Dishes</a>
                        <a class="footer__link no-cursor">Contact</a>
                    </div>
                    <div class="footer__copyright">Copyright &copy; 2021 Tasty
                        Dishes. All rights reserved.
                    </div>
                </div>
            </div>
        </footer>
        <script src="coffee.js"></script>
    </body>

</html>
